<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />
        <title>Mini Rogue — Escolha seu Herói</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="assets/js/theme-toggle.js?v=1"></script>
        <script src="assets/js/session.js?v=1"></script>
        <script src="assets/js/player.js?v=1"></script>
        <script src="assets/js/hero-selector.js?v=1"></script>
    </head>
    <body class="d-flex flex-column min-vh-100">

        <div id="header-placeholder"></div>
        <main class="d-flex flex-grow-1 justify-content-center align-items-center">
            <div id="hero-selector-placeholder" class="w-100"></div>
        </main>

        <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('pages/header-minimal.html')
                .then(r => r.text())
                .then(html => {
                    document.getElementById('header-placeholder').innerHTML = html;
                    ThemeToggle.initButton();
                });

            fetch('pages/hero-selector.html')
                .then(r => r.text())
                .then(html => {
                    document.getElementById('hero-selector-placeholder').innerHTML = html;
                    initHeroSelector();
                });
        });
        </script>
    </body>
</html>
