<div class="modal fade" id="modalDiceResult" tabindex="-1"
     aria-labelledby="modalDiceResultLabel" aria-hidden="true"
     data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalDiceResultLabel">E o resultado é...</h5>
            </div>
            <div class="modal-body">

                <!-- Ataque do jogador -->
                <section class="mb-3">
                    <div class="d-flex align-items-center gap-2 mb-1">
                        <h4 id="player-roll" class="mb-0">-</h4>
                        <span id="player-roll-result" class="text-muted small"></span>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <p id="player-attack-text" class="mb-0"></p>
                        <img id="player-dice-img" src="assets/img/dice.png" width="36" height="36" alt="Dado" class="d-none">
                        <button id="btn-reroll" class="btn btn-secondary btn-sm">
                            Rolar novamente (<span id="reroll-count">1</span>)
                        </button>
                    </div>
                </section>

                <hr>

                <!-- Ataque do monstro -->
                <section>
                    <p class="mb-1">Seu oponente...</p>
                    <div class="d-flex align-items-center gap-2 mb-1">
                        <h4 id="monster-roll" class="mb-0">-</h4>
                        <span id="monster-roll-result" class="text-muted small"></span>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <p id="monster-attack-text" class="mb-0"></p>
                        <img id="monster-dice-img" src="assets/img/dice.png" width="36" height="36" alt="Dado" class="d-none">
                    </div>
                </section>

            </div>
            <div class="modal-footer justify-content-center">
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Ok</button>
            </div>
        </div>
    </div>
</div>
