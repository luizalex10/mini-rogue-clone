<div class="modal fade" id="modalGameOver" tabindex="-1"
     aria-labelledby="modalGameOverLabel" aria-hidden="true"
     data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalGameOverLabel">💀 Fim</h5>
            </div>
            <div class="modal-body text-center">
                <p>Sua vida se encerrou, tente novamente.</p>
            </div>
            <div class="modal-footer justify-content-center">
                <button type="button" class="btn btn-danger" onclick="Player.reset()">
                    Reiniciar
                </button>
            </div>
        </div>
    </div>
</div>
