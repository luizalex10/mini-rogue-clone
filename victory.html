<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />
        <title>Mini Rogue — Vitória!</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="assets/js/theme-toggle.js?v=1"></script>
        <script src="assets/js/session.js?v=1"></script>
        <script src="assets/js/player.js?v=1"></script>
    </head>
    <body class="d-flex flex-column min-vh-100">

        <div id="header-placeholder"></div>
        <div id="debug-placeholder"></div>

        <main class="d-flex flex-grow-1 flex-column justify-content-center align-items-center text-center px-3">
            <h1 class="display-4 mb-3">🏆 Vitória!</h1>
            <p class="lead mb-1">Você derrotou o chefe final e completou a aventura!</p>
            <p id="victory-stats" class="text-muted mb-4"></p>
            <button id="btn-back" class="btn btn-primary btn-lg">Voltar ao início</button>
        </main>

        <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('pages/header.html')
                .then(r => r.text())
                .then(html => {
                    const tmp = document.createElement('div');
                    tmp.innerHTML = html;
                    document.getElementById('header-placeholder').replaceWith(tmp.querySelector('header'));
                    const nav = tmp.querySelector('nav');
                    if (nav) document.getElementById('debug-placeholder').replaceWith(nav);
                    ThemeToggle.initButton();
                    Player.initUI();
                });

            const state = JSON.parse(localStorage.getItem('player-data') || '{}');
            const stats = [];
            if (state.rooms      !== undefined) stats.push(`${state.rooms} salas exploradas`);
            if (state.experience !== undefined) stats.push(`${state.experience} XP acumulado`);
            if (state.coins      !== undefined) stats.push(`${state.coins} moedas`);
            document.getElementById('victory-stats').textContent = stats.join(' · ');

            document.getElementById('btn-back').addEventListener('click', () => {
                Player.reset();
            });
        });
        </script>
    </body>
</html>
